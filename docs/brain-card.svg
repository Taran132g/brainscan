<svg xmlns="http://www.w3.org/2000/svg" width="760" height="540" viewBox="0 0 760 540" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#0c1118"/>
    </linearGradient>
    <radialGradient id="g1" cx="18%" cy="20%" r="60%">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.22"/><stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="85%" r="60%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.18"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="760" height="540" rx="16" fill="#06080f"/>

  <!-- Hero -->
  <g>
    <rect x="20" y="20" width="720" height="208" rx="16" fill="url(#hero)" stroke="#1e293b"/>
    <rect x="20" y="20" width="720" height="208" rx="16" fill="url(#g1)"/>
    <rect x="20" y="20" width="720" height="208" rx="16" fill="url(#g2)"/>
    <!-- brand row -->
    <rect x="44" y="42" width="30" height="30" rx="8" fill="#10b981"/>
    <text x="59" y="63" fill="#06080f" font-size="15" font-weight="700" text-anchor="middle">BS</text>
    <text x="86" y="62" fill="#ffffff" font-size="16" font-weight="600">BrainScan</text>
    <text x="716" y="62" fill="#94a3b8" font-size="13" text-anchor="end">Brain Card</text>
    <!-- identity -->
    <circle cx="74" cy="120" r="30" fill="#10b981"/>
    <text x="74" y="129" fill="#06080f" font-size="22" font-weight="700" text-anchor="middle">AR</text>
    <text x="120" y="118" fill="#ffffff" font-size="30" font-weight="700">Alex Rivera</text>
    <text x="121" y="142" fill="#cbd5e1" font-size="14">San Francisco · Stanford</text>
    <!-- signal pills -->
    <g font-size="12.5">
      <rect x="44" y="168" width="132" height="28" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#334155"/>
      <text x="110" y="186" fill="#e2e8f0" text-anchor="middle">openness: high</text>
      <rect x="184" y="168" width="150" height="28" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#334155"/>
      <text x="259" y="186" fill="#e2e8f0" text-anchor="middle">connection: secure</text>
      <rect x="342" y="168" width="158" height="28" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#334155"/>
      <text x="421" y="186" fill="#e2e8f0" text-anchor="middle">core drive: mastery</text>
      <rect x="508" y="168" width="120" height="28" rx="14" fill="#10b981" fill-opacity="0.14" stroke="#10b981" stroke-opacity="0.5"/>
      <text x="568" y="186" fill="#34d399" text-anchor="middle">✓ 86% confidence</text>
    </g>
  </g>

  <!-- Section: Who They Are -->
  <g>
    <rect x="20" y="244" width="350" height="276" rx="14" fill="#0c111a" stroke="#1e293b"/>
    <text x="40" y="276" fill="#34d399" font-size="13" font-weight="600">WHO THEY ARE</text>
    <g fill="#cbd5e1" font-size="13">
      <text x="40" y="304">A builder and obsessive note-taker who thinks</text>
      <text x="40" y="326">on the page. Years of half-finished ideas,</text>
      <text x="40" y="348">book margins, and 2am voice memos — the raw</text>
      <text x="40" y="370">material of someone learning in public and in</text>
      <text x="40" y="392">private at once.</text>
    </g>
    <text x="40" y="430" fill="#34d399" font-size="13" font-weight="600">HOW THEY THINK</text>
    <g fill="#cbd5e1" font-size="13">
      <text x="40" y="458">First-principles and fast. Prototypes ideas to</text>
      <text x="40" y="480">understand them; trusts evidence over consensus.</text>
    </g>
  </g>

  <!-- Section: How They Connect -->
  <g>
    <rect x="390" y="244" width="350" height="276" rx="14" fill="#0c111a" stroke="#1e293b"/>
    <text x="410" y="276" fill="#34d399" font-size="13" font-weight="600">HOW THEY CONNECT</text>
    <g fill="#cbd5e1" font-size="13">
      <text x="410" y="304">Loyal and direct; bonds over ideas and shared</text>
      <text x="410" y="326">obsessions, not small talk. Invests in a few deep</text>
      <text x="410" y="348">relationships and notices when they go quiet.</text>
    </g>
    <text x="410" y="388" fill="#34d399" font-size="13" font-weight="600">WHAT DRIVES THEM</text>
    <g fill="#cbd5e1" font-size="13">
      <text x="410" y="416">Honesty, momentum, craft — and the discomfort</text>
      <text x="410" y="438">of not yet being good enough at the thing they</text>
      <text x="410" y="460">care about most. (Plus an honest growth edge.)</text>
    </g>
  </g>
</svg>
