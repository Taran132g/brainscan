<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a12"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="25%" r="55%">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="82%" cy="78%" r="55%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#glowL)"/>
  <rect width="1200" height="420" fill="url(#glowR)"/>

  <!-- node graph on the right -->
  <g stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1">
    <line x1="820" y1="90"  x2="930" y2="60"/>
    <line x1="930" y1="60"  x2="1040" y2="110"/>
    <line x1="1040" y1="110" x2="1110" y2="70"/>
    <line x1="820" y1="90"  x2="870" y2="170"/>
    <line x1="930" y1="60"  x2="970" y2="160"/>
    <line x1="1040" y1="110" x2="1010" y2="200"/>
    <line x1="870" y1="170" x2="970" y2="160"/>
    <line x1="970" y1="160" x2="1010" y2="200"/>
    <line x1="870" y1="170" x2="840" y2="270"/>
    <line x1="970" y1="160" x2="940" y2="280"/>
    <line x1="1010" y1="200" x2="1080" y2="270"/>
    <line x1="940" y1="280" x2="1080" y2="270"/>
    <line x1="840" y1="270" x2="940" y2="280"/>
    <line x1="940" y1="280" x2="900" y2="350"/>
    <line x1="1080" y1="270" x2="1030" y2="350"/>
  </g>
  <g fill="#94a3b8" fill-opacity="0.55">
    <circle cx="820" cy="90" r="4"/><circle cx="1040" cy="110" r="5"/>
    <circle cx="870" cy="170" r="4"/><circle cx="1010" cy="200" r="4"/>
    <circle cx="840" cy="270" r="4"/><circle cx="1080" cy="270" r="5"/>
    <circle cx="900" cy="350" r="4"/>
  </g>
  <g fill="#10b981">
    <circle cx="930" cy="60" r="6"/><circle cx="970" cy="160" r="7"/>
    <circle cx="940" cy="280" r="6"/><circle cx="1030" cy="350" r="5"/>
    <circle cx="1110" cy="70" r="5"/>
  </g>

  <!-- wordmark + copy -->
  <text x="90" y="150" fill="#ffffff" font-size="64" font-weight="700">🧠 BrainScan</text>
  <text x="92" y="208" fill="#cbd5e1" font-size="27" font-weight="500">An AI that reads your second brain and shows you</text>
  <text x="92" y="244" fill="#cbd5e1" font-size="27" font-weight="500">how you <tspan fill="#34d399" font-weight="700">actually think</tspan> — from your own notes.</text>

  <!-- chips -->
  <g font-size="16" font-weight="600">
    <rect x="92" y="286" width="150" height="34" rx="17" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.5"/>
    <text x="167" y="308" fill="#34d399" text-anchor="middle">Obsidian · Notion</text>
    <rect x="256" y="286" width="96" height="34" rx="17" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.4"/>
    <text x="304" y="308" fill="#e2e8f0" text-anchor="middle">RAG</text>
    <rect x="366" y="286" width="120" height="34" rx="17" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.4"/>
    <text x="426" y="308" fill="#e2e8f0" text-anchor="middle">self-hostable</text>
  </g>

  <text x="92" y="372" fill="#64748b" font-size="15">Upload your digital brain → a whole-person Brain Card: 6 sections + an 8-signal read.</text>
</svg>
